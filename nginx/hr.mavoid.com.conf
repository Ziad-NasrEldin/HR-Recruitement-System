upstream hr_app {
    server 127.0.0.1:3741;
}

server {
    server_name hr.mavoid.com;

    # Next.js handles everything including /api routes (monolith)
    location / {
        proxy_pass http://hr_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for AI endpoints (voice assessment, post generation)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hr.mavoid.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hr.mavoid.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = hr.mavoid.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name hr.mavoid.com;
    return 404; # managed by Certbot
}
